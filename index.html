<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mondrian Project</title>
  <style>

    body{
      display:flex;
      justify-content: center;
      align-items:center;
      height:100vh;
    }

    .container{
      display:grid;
      background-color:#000;
      width:748px;
      height: 746px;
      grid-template-columns: 320px 198px 153px 50px;
      grid-template-rows: 414px 130px 155px;
      gap:9px;
    }

    .red{
      background-color: #E72F24;
      grid-area:1/1/2/2;
    }

    .white{
      background-color: #F0F1EC;
    }

    .item1{
      grid-column: span 3;
    }

    .item2{
      grid-row:span 2;
      grid-column: 1 2;
    }

    .item3{
      grid-row:span 2;
      grid-column:span 2;
    }

    .blue{
      background-color: #004592;
      grid-area:2/4/3/-1;
    }

    .item4{
      grid-row:span 2;
      grid-column:4 5;
    }

    .item5{
      grid-row:4 5;
      grid-column: 1 2;
    }

    .yellow{
      background-color: #F9D01E;
      grid-row:4 5;
      grid-column:2 3;
    }

    .black{
      background-color: #232629;
      grid-area:4/3/5/4;
    }


  </style>
</head>

<body>
  <!-- Write your HTML here -->
   <div class="container">
    <div class="red"></div>
    <div class="white item1"></div>
    <div class="white item2"></div>
    <div class="white item3"></div>
    <div class="blue"></div>
    <div class="white item4"></div>
    <div class="white item5"></div>
    <div class="yellow"></div>
    <div class="black"></div>
   </div>

</body>

</html>
